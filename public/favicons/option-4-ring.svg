<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0b0d12"/>
  <!-- Background ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#1f2937" stroke-width="6"/>
  <!-- Progress arc (~65%) -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#10b981" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="125.66" stroke-dashoffset="44"
          transform="rotate(-90 32 32)"/>
  <!-- Centered "A" -->
  <text x="32" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700" fill="#e8e9ec">A</text>
</svg>
